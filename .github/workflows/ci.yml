name: CI

on:
  pull_request:
  push:
    branches: [dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          # Caches ~/.m2/repository keyed on pom.xml, no separate cache step needed.
          cache: maven

      # Runs the full test suite, including the Testcontainers-backed
      # integration tests in AbstractIntegrationTest/SecurityIntegrationTest
      # (REF-3) - GitHub's ubuntu-latest runners have Docker available
      # natively, so those spin up a real ephemeral Mongo.
      - name: Build and test
        run: ./mvnw -B verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14
