services:
  mongo:
    image: mongo:7
    container_name: penguin-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: social
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build: .
    container_name: penguin-app
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # --- MongoDB (standard Spring Data Mongo binding) ---
      SPRING_DATA_MONGODB_URI: mongodb://root:root@mongo:27017/social?authSource=admin

      # --- CORS: local frontend origin(s), comma-separated (see SocialAppProperties.Cors) ---
      SOCIAL_APP_CORS_ALLOWED_ORIGINS: http://localhost:3000

      # --- JWT (see SocialAppProperties.Jwt). TTL values are in SECONDS.
      # Secrets must be >= 64 chars (512 bits) for HS512 - these dev values
      # are fine for local docker-compose but change them for anything real. ---
      SOCIAL_APP_JWT_SECRET: dev-access-secret-change-me-0123456789abcdef0123456789abcdef0123456789
      SOCIAL_APP_JWT_REFRESH_SECRET: dev-refresh-secret-change-me-fedcba9876543210fedcba9876543210fedcba987
      SOCIAL_APP_JWT_ACCESS_TTL: "86400"  # access token: 1 day
      SOCIAL_APP_JWT_REFRESH_TTL: "604800" # refresh token: 7 days

      # --- Cloudinary (see SocialAppProperties.Cloudinary). Uploads fail without real values ---
      SOCIAL_APP_CLOUDINARY_CLOUD_NAME: ${SOCIAL_APP_CLOUDINARY_CLOUD_NAME:-demo}
      SOCIAL_APP_CLOUDINARY_CLOUD_API_KEY: ${SOCIAL_APP_CLOUDINARY_CLOUD_API_KEY:-000000000000000}
      SOCIAL_APP_CLOUDINARY_CLOUD_SECRET_KEY: ${SOCIAL_APP_CLOUDINARY_CLOUD_SECRET_KEY:-demo-secret}

      # --- Mail (see SendEmailService). Optional for local dev ---
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}

  # Optional web UI for the database. Start with:  docker compose --profile tools up
  mongo-express:
    image: mongo-express:1
    container_name: penguin-mongo-express
    profiles: ["tools"]
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://root:root@mongo:27017/?authSource=admin
      ME_CONFIG_BASICAUTH: "false"

volumes:
  mongo-data:
