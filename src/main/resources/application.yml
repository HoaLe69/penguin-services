# Structural, non-secret defaults only. Secrets (JWT keys, Cloudinary,
# Mongo, mail) have no defaults here on purpose — they must come from env
# vars or a local (gitignored) application.properties, so a missing value
# fails startup loudly instead of silently falling back to something wrong.
spring:
  data:
    mongodb:
      # Create/update @Indexed/@CompoundIndex-declared indexes on startup.
      # If the users/posts/comments/messages/room collections already have
      # data that violates a new unique index (userName, socialId), index
      # creation will fail loudly at boot rather than silently skip it.
      auto-index-creation: true
    web:
      pageable:
        # One contract for every Pageable-typed controller param: page/size
        # query params (0-indexed), a sane default, and a hard cap so a
        # client can't request an unbounded page.
        default-page-size: 10
        max-page-size: 50
        one-indexed-parameters: false

management:
  endpoints:
    web:
      exposure:
        # Only health/info over HTTP - not the full actuator surface (env,
        # beans, etc.), which could leak config/internals if ever exposed
        # by accident.
        include: health, info
  endpoint:
    health:
      # Include the Mongo (and other) health indicator details in the
      # response body, not just a top-level "UP"/"DOWN" - the Docker/
      # orchestrator healthcheck and anyone debugging a down instance both
      # want to see *what's* unhealthy.
      show-details: always

social-app:
  cookie:
    secure: true

---
spring:
  config:
    activate:
      on-profile: dev

# Local http-only dev: relax cookies (CookieService falls back SameSite to
# Lax when secure=false) and default the CORS origin to the local frontend.
social-app:
  cookie:
    secure: false
  cors:
    allowed-origins: http://localhost:3000
